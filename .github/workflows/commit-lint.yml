name: Validate Conventional Commits

on:
  pull_request:
    branches:
      - main

# Cancel in-flight run if the PR gets new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Least privilege (job will only need read permissions)
permissions:
  contents: read

jobs:
  conventional-commits:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate each commit against Conventional Commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Conventional Commits header grammar:
          #   <type>[optional (scope)][optional !]: <description>
          # Spec: https://www.conventionalcommits.org
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-zA-Z0-9 _./-]+\))?(!)?: .+'

          echo "Validating commits in range ${BASE_SHA}..${HEAD_SHA}"
          echo

          failed=0

          # Iterate over ONLY the commits this PR adds on top of the base
          # branch. --no-merges skips auto-generated merge commits, which
          # legitimately don't follow the convention.
          while IFS= read -r sha; do
            subject="$(git log -1 --format=%s "$sha")"

            if printf '%s' "$subject" | grep -qE "$pattern"; then
              echo "PASS  ${sha:0:8}  $subject"
            else
              echo "FAIL  ${sha:0:8}  $subject"
              failed=1
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")

          echo
          if [ "$failed" -ne 0 ]; then
            {
              echo "::error::One or more commit messages do not follow the Conventional Commits standard."
              echo "Expected format:  <type>(optional scope)!: <description>"
              echo "Allowed types:    build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
              echo "Example:          feat(auth): add OAuth2 login flow"
            } >&2
            exit 1
          fi

          echo "All commit messages follow the Conventional Commits standard."
